name: spend_smart
description: SpendSmart - AI-powered personal finance tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  get: ^4.6.6
  # Icons
  cupertino_icons: ^1.0.6
  # Fonts
  google_fonts: ^6.2.1
  # Date formatting for export file names
  intl: ^0.19.0
  # PDF generation — pure Dart, no native code required
  pdf: ^3.10.8
  # File system paths (Documents, Downloads, temp)
  path_provider: ^2.1.3
  # Open/share generated files
  open_filex: ^4.3.4
  # CSV writing
  csv: ^6.0.0
  # Permissions (storage on Android < 13)
  permission_handler: ^11.3.1
  # Color picker for accent color selection
  flutter_colorpicker: ^1.0.3

  # ── Hen Blitz game engine ──────────────────────────────────────────────────
  flame: ^1.18.0
  flame_audio: ^2.1.1
  crypto: ^3.0.3
  firebase_core: ^3.6.0
  cloud_functions: ^5.1.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/game/sprites/
    - assets/game/bg/
    - assets/game/audio/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
